<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Brand | AI Brand Studio - Intake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">AI BRAND <span>STUDIO</span></a>
                <div class="nav-links">
                    <a href="services.html">Services</a>
                    <a href="demo.html">Demo</a>
                    <a href="pricing.html">Pricing</a>
                    <a href="login.html">Login</a>
                    <a href="signup.html" class="btn btn-outline" style="padding: 0.5rem 1.5rem;">Sign Up</a>
                    <a href="contact.html" class="btn" style="padding: 0.5rem 1.5rem;">Start Your Brand</a>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding: 8rem 0;">
        <div class="container">
            <h1 class="section-title">Start Your Brand Journey</h1>
            <p style="text-align: center; color: var(--muted-text); margin-bottom: 4rem; max-width: 600px; margin-left: auto; margin-right: auto;">Fill out the initial intake form below. Our AI systems will begin analyzing your direction immediately.</p>
            
            <form class="contact-form" action="#">
                <div class="form-group">
                    <label for="brand-name">Brand Name (or Placeholder)</label>
                    <input type="text" id="brand-name" placeholder="e.g. VŌID" required>
                </div>
                
                <div class="form-group">
                    <label for="aesthetic">Aesthetic Direction</label>
                    <select id="aesthetic">
                        <option value="minimal">Minimal / High-Fashion</option>
                        <option value="streetwear">Streetwear / Industrial</option>
                        <option value="luxury">Heritage Luxury</option>
                        <option value="athletic">High-Performance Athletic</option>
                        <option value="vintage">Vintage / Retro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="services">Primary Services Needed</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                        <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox" style="width: auto; margin-right: 0.5rem;"> Logo Concepts</label>
                        <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox" style="width: auto; margin-right: 0.5rem;"> Tech Packs</label>
                        <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox" style="width: auto; margin-right: 0.5rem;"> Mockups</label>
                        <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox" style="width: auto; margin-right: 0.5rem;"> Social Campaigns</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="budget">Monthly Budget Range</label>
                    <select id="budget">
                        <option value="starter">$49 - $199</option>
                        <option value="growth">$200 - $499</option>
                        <option value="pro">$500+</option>
                        <option value="package">One-time Premium Package</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Tell us about your vision</label>
                    <textarea id="notes" rows="5" placeholder="Describe the soul of your brand..."></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Initialize Studio Access</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-logo">AI BRAND STUDIO</div>
            <p class="copyright">&copy; 2026 AI Brand Studio. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
