<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Brand Studio - Welcome Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .auth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
        }
        .auth-card {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
        }
        .auth-card h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--muted-text);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }
        .auth-card .form-group {
            margin-bottom: 1.5rem;
        }
        .auth-card .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: var(--muted-text);
        }
        .auth-card .form-group label .icon {
            font-size: 1rem;
        }
        .auth-card input {
            width: 100%;
            padding: 1rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }
        .auth-card input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .auth-card input::placeholder {
            color: #555;
        }
        .auth-card .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            margin-top: 0.5rem;
        }
        .auth-card .btn-submit:hover {
            background-color: #9a6b09;
            transform: translateY(-2px);
        }
        .auth-card .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .auth-card .auth-redirect {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--muted-text);
        }
        .auth-card .auth-redirect a {
            color: var(--accent-color);
            font-weight: 700;
        }
        .auth-card .auth-redirect a:hover {
            text-decoration: underline;
        }
        .auth-card .divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }
        .auth-error {
            display: none;
            background-color: rgba(255, 50, 50, 0.1);
            border: 1px solid #ff3232;
            color: #ff6464;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .auth-success {
            display: none;
            background-color: rgba(50, 255, 50, 0.1);
            border: 1px solid #32bb32;
            color: #64dd64;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body class="auth-page">
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">AI BRAND <span>STUDIO</span></a>
                <div class="nav-links">
                    <a href="services.html">Services</a>
                    <a href="demo.html">Demo</a>
                    <a href="pricing.html">Pricing</a>
                    <a href="signup.html" class="btn btn-outline" style="padding: 0.5rem 1.5rem;">Sign Up</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to your AI Brand Studio dashboard</p>

            <div id="auth-error" class="auth-error"></div>
            <div id="auth-success" class="auth-success"></div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email"><span class="icon">✉</span> Email Address</label>
                    <input type="email" id="email" placeholder="your@brand.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password"><span class="icon">🔒</span> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" id="login-btn">Log In</button>

                <hr class="divider">

                <p class="auth-redirect">
                    Don't have an account? <a href="signup.html">Create one</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-logo">AI BRAND STUDIO</div>
            <p class="copyright">&copy; 2026 AI Brand Studio. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Handle login form submission
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            // Clear previous messages
            document.getElementById('auth-error').style.display = 'none';
            document.getElementById('auth-success').style.display = 'none';

            // Basic validation
            if (!email || !password) {
                showAuthError('Please enter both email and password.');
                return false;
            }

            // Disable button
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const result = await signIn(email, password);
            
            btn.disabled = false;
            btn.textContent = 'Log In';

            if (result && result.session) {
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            }
            // Errors are handled by showAuthError in auth.js

            return false;
        }
    </script>
</body>
</html>
